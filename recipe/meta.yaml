{% set name = "aimz" %}
{% set version = "0.11.0" %}
{% set python_min = 3.11 %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/aimz-{{ version }}.tar.gz
  sha256: 5dd3821bdccd4ab4662e482571747460b3f814d6b2fd8b2ea9b573c4f69b3fc9

build:
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0
  noarch: python

requirements:
  host:
    - python {{ python_min }}
    - setuptools
    - pip
  run:
    - python >={{ python_min }}
    - dask-core >=2025.10
    - jax >=0.9,<0.10
    - numpyro >=0.20.0
    - scikit-learn >=1.6.1
    - xarray >=2025.10
    - zarr >=3,<4

test:
  imports:
    - aimz
  commands:
    - pip check
  requires:
    - pip
    - python {{ python_min }}

about:
  home: https://pypi.org/project/aimz/
  summary: Scalable probabilistic impact modeling
  license: Apache-2.0
  license_file: LICENSE

extra:
  recipe-maintainers:
    - markean
