{% set name = "aimz" %}
{% set version = "0.5.0" %}
{% set python_min = 3.11 %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/aimz-{{ version }}.tar.gz
  sha256: 00d4bcbe6fe178c02580896ed7a0ecc52c689a4c2cbeb9de8f5812339f4c41f5

build:
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0
  noarch: python

requirements:
  host:
    - python {{ python_min }}
    - setuptools
    - pip
  run:
    - python >={{ python_min }}
    - dask-core >=2025.5
    - jax >=0.7
    - numpyro >=0.19.0
    - scikit-learn >=1.6.1
    - tqdm >=4.67
    - xarray >=2025.4
    - zarr >=3,<4

test:
  imports:
    - aimz
  commands:
    - pip check
  requires:
    - pip
    - python {{ python_min }}

about:
  home: https://pypi.org/project/aimz/
  summary: Scalable probabilistic impact modeling
  license: Apache-2.0
  license_file: LICENSE

extra:
  recipe-maintainers:
    - markean
